<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
  <title>Frontend Mentor | Social links profile</title>
  <link rel="stylesheet" href="index.css">
</head>

<body>

  <main>
    <article>
      <div class="largura">
        <figure class="profile">
          <img src="./assets/images/avatar-jessica.jpeg" alt="Jessica Randall's Profile Picture" class="profile-image">
          <figcaption>
            <h1 class="g-text">Jessica Randall</h1>
            <h2 class="p-text">London, United Kingdom</h2>
            <p class="p-text">"Front-end developer and avid reader."</p>
          </figcaption>
        </figure>
        <nav class="links-profile">
          <ul>
            <li><a class="m-text" href="https://github.com/MarcosBarreto15" target="_blank" rel="noopener noreferrer" aria-label="GitHub (opens in a new tab)">GitHub</a></li>
            <li><a class="m-text" href="https://www.frontendmentor.io/home" target="_blank" rel="noopener noreferrer" aria-label="Frontend Mentor (opens in a new tab)">Frontend Mentor</a></li>
            <li><a class="m-text" href="https://www.linkedin.com/feed/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn (opens in a new tab)">LinkedIn</a></li>
            <li><a class="m-text" href="https://x.com/" target="_blank" rel="noopener noreferrer" aria-label="Twitter (opens in a new tab)">Twitter</a></li>
            <li><a class="m-text" href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer" aria-label="Instagram (opens in a new tab)">Instagram</a></li>
          </ul>
        </nav>
      </div>
    </article>
  </main>
</body>

</html>
